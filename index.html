            { name: "香附", category: "理氣", taste: "辛、微苦、微甘，性平", effect: "疏肝解鬱，理氣寬中，調經止痛", usage: "煎服6-9克", caution: "氣虛者慎用", priority: 43 },
            { name: "赤芍", category: "活血", taste: "苦，性微寒", effect: "清熱涼血，散瘀止痛", usage: "煎服6-12克", caution: "脾胃虛寒者慎用", priority: 44 },
            { name: "薑黃", category: "活血", taste: "辛、苦，性溫", effect: "破血行氣，通經止痛", usage: "煎服3-10克", caution: "孕婦、血虛者慎用", priority: 45 },
            { name: "益母草", category: "活血", taste: "辛、苦，性微寒", effect: "活血調經，利尿消腫，清熱解毒", usage: "煎服9-30克", caution: "孕婦慎用", priority: 46 },
            { name: "羅漢果", category: "化痰", taste: "甘，性涼", effect: "清熱潤肺，利咽開音，滑腸通便", usage: "煎服9-15克", caution: "脾胃虛寒者慎用", priority: 47 },
            { name: "胖大海", category: "化痰", taste: "甘，性寒", effect: "清熱潤肺，利咽開音，潤腸通便", usage: "沸水泡服2-3枚", caution: "脾胃虛寒者慎用", priority: 48 },
            { name: "杏仁", category: "化痰", taste: "苦，性溫", effect: "降氣止咳平喘，潤腸通便", usage: "煎服5-10克", caution: "嬰兒慎用，不宜過量", priority: 49 },
            { name: "川貝母", category: "化痰", taste: "苦、甘，性微寒", effect: "清熱潤肺，化痰止咳，散結消腫", usage: "煎服3-10克", caution: "脾胃虛寒、寒痰者慎用", priority: 50 }
        ];

        const weatherTips = {
            hot: "炎熱天氣：宜清熱瀉火，多飲綠豆湯、菊花茶。避免辛辣刺激性食物。",
            cold: "寒冷天氣：宜溫補驅寒，適量生薑、紅棗桂圓茶。注意保暖，免受風寒。",
            humid: "潮濕天氣：宜健脾祛濕，可食薏仁、赤小豆。注意通風防潮。",
            dry: "乾燥天氣：宜滋陰潤燥，多飲百合、銀耳湯。避免熬夜傷陰。",
            normal: "天氣舒適：宜戶外活動，適度運動增強體質。注意飲食均衡。"
        };

        let currentHerb = null;
        let displayCount = 5;
        const LOAD_MORE_COUNT = 10;

        function renderHerbs(filter = "") {
            const list = document.getElementById("herbList");
            let filtered = herbs.filter(h => h.name.includes(filter) || h.category.includes(filter) || h.effect.includes(filter) || (h.meridian && h.meridian.includes(filter)) || (h.clinical && h.clinical.includes(filter)));
            
            // Sort by priority (common first)
            filtered.sort((a, b) => (a.priority || 999) - (b.priority || 999));
            
            const toShow = filtered.slice(0, displayCount);
            list.innerHTML = toShow.map(h => `
                <div class="herb-card" onclick="showDetail('\''${h.name}'\'')">
                    <img class="herb-thumb" src="${h.image || 'https://via.placeholder.com/60?text=' + h.name}" alt="${h.name}">
                    <div class="herb-info">
                        <div class="herb-name">${h.name}</div>
                        <span class="herb-category">${h.category}</span>
                        <div class="herb-effect">${h.effect.substring(0, 30)}...</div>
                    </div>
                </div>
            `).join("");
            
            // Add load more button if there are more results
            if (filtered.length > displayCount) {
                list.innerHTML += '<button class="load-more" onclick="loadMore()">載入更多 (' + (filtered.length - displayCount) + ')</button>';
            }
        }

        function loadMore() {
            displayCount += LOAD_MORE_COUNT;
            renderHerbs(document.getElementById("searchInput").value);
        }

        function showDetail(name) {
            const herb = herbs.find(h => h.name === name);
            if (!herb) return;
            currentHerb = herb;
            document.getElementById("detailTitle").textContent = herb.name;
            document.getElementById("detailTaste").textContent = herb.taste || "-";
            document.getElementById("detailMeridian").textContent = herb.meridian || "-";
            document.getElementById("detailEffect").textContent = herb.effect;
            document.getElementById("detailClinical").textContent = herb.clinical || "-";
            document.getElementById("detailPharmacology").textContent = herb.pharmacology || "-";
            document.getElementById("detailChemistry").textContent = herb.chemistry || "-";
            document.getElementById("detailCompatibility").textContent = herb.compatibility || "-";
            document.getElementById("detailUsage").textContent = herb.usage;
            document.getElementById("detailCaution").textContent = herb.caution;
            document.getElementById("detailModal").classList.add("active");
        }

        function closeDetail() {
            document.getElementById("detailModal").classList.remove("active");
        }

        function toggleFavorite() {
            alert(currentHerb ? "已收藏：" + currentHerb.name : "");
        }

        document.getElementById("searchInput").addEventListener("input", e => {
            displayCount = 5;
            renderHerbs(e.target.value);
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async pos => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                try {
                    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current=temperature_2m,relative_humidity_2m");
                    const data = await res.json();
                    const temp = data.current.temperature_2m;
                    const hum = data.current.relative_humidity_2m;
                    document.getElementById("temp").textContent = temp;
                    document.getElementById("location").textContent = "📍 您的位置";
                    
                    let tip = weatherTips.normal;
                    if (temp > 30) tip = weatherTips.hot;
                    else if (temp < 10) tip = weatherTips.cold;
                    else if (hum > 80) tip = weatherTips.humid;
                    else if (hum < 30) tip = weatherTips.dry;
                    document.getElementById("weatherTips").textContent = tip;
                } catch (e) {
                    document.getElementById("weatherTips").textContent = "天氣載入失敗，請檢查網絡";
                }
            }, () => {
                document.getElementById("location").textContent = "未獲取定位";
                document.getElementById("weatherTips").textContent = weatherTips.normal;
            });
        }

        document.getElementById("version").textContent = APP_VERSION;

        renderHerbs();
    </script>
</body>
</html>
